<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JR Catálogo</title>
<meta name="theme-color" content="#1a1410">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JR Catálogo">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1410;--paper:#f8f4ef;--cream:#ede8e1;--gold:#b8923a;--gold-light:#d4aa5a;--shadow:rgba(26,20,16,0.12);--accent:#7a3b1e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
header{background:var(--ink);color:var(--paper);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.3)}
.brand-wrap{display:flex;align-items:center;gap:10px}
.brand-logo{width:44px;height:44px;object-fit:contain;flex-shrink:0}
.brand{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;letter-spacing:0.12em;color:var(--gold-light)}
.header-right{text-align:right;flex-shrink:0}
.date-display{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#aaa;margin-bottom:6px}
.btn-row{display:flex;gap:6px;justify-content:flex-end;align-items:center}
.share-btn{background:transparent;color:var(--gold-light);border:1px solid var(--gold);width:34px;height:34px;border-radius:3px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.share-btn:hover{background:var(--gold)}
.share-btn svg{width:15px;height:15px;stroke:var(--gold-light);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cart-btn{background:var(--gold);color:white;border:none;padding:7px 14px;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:0.8rem;letter-spacing:0.08em;cursor:pointer;transition:background 0.2s;display:inline-flex;align-items:center;gap:6px}
.cart-btn:hover{background:var(--gold-light)}
.cart-count{background:white;color:var(--gold);border-radius:50%;width:19px;height:19px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:0.7rem}
.instructions{background:var(--cream);border-bottom:1px solid #ddd6cc;padding:11px 20px;font-size:0.78rem;color:#776a5e;letter-spacing:0.03em}
#install-banner{display:none;background:#2a1f14;padding:10px 20px;text-align:center}
#loading{text-align:center;padding:80px 40px;font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:#aaa;display:flex;flex-direction:column;align-items:center;gap:20px}
.spinner{width:36px;height:36px;border:2px solid var(--cream);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#error-msg{display:none;background:#fff5f5;border:1px solid #fca5a5;border-radius:8px;padding:24px;margin:30px;text-align:center;color:#b91c1c;line-height:1.7}
#gallery{display:none;padding:16px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.item-card{background:white;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px var(--shadow);transition:transform 0.2s,box-shadow 0.2s;cursor:pointer;position:relative;border:2px solid transparent}
.item-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px var(--shadow)}
.item-card.selected{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 8px 28px var(--shadow)}
.img-wrap{position:relative;width:100%;padding-top:141%;overflow:hidden;background:var(--cream)}
.img-placeholder{position:absolute;inset:0;background:linear-gradient(135deg,#ede8e1 25%,#e0d9d0 50%,#ede8e1 75%);background-size:200% 200%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.item-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;pointer-events:none;-webkit-user-drag:none;background:var(--cream);opacity:0;transition:opacity 0.3s}
.item-card img.loaded{opacity:1}
.check-overlay{position:absolute;top:10px;right:10px;width:30px;height:30px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0.6);transition:opacity 0.2s,transform 0.2s;z-index:2}
.item-card.selected .check-overlay{opacity:1;transform:scale(1)}
.item-info{padding:10px 14px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--cream)}
.item-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--ink);width:100%}
.qty-control{display:flex;align-items:center;gap:5px;opacity:0;transition:opacity 0.2s;pointer-events:none;height:0;overflow:hidden}
.item-card.selected .qty-control{opacity:1;pointer-events:all;height:auto;overflow:visible}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--gold);background:white;color:var(--gold);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;line-height:1;flex-shrink:0}
.qty-btn:hover{background:var(--gold);color:white}
.qty-input{width:44px;text-align:center;font-weight:600;font-size:0.95rem;border:1px solid #ddd;border-radius:6px;padding:3px 4px;font-family:'DM Sans',sans-serif;color:var(--ink);-webkit-user-select:text;user-select:text}
.qty-input:focus{outline:none;border-color:var(--gold)}
.load-more{text-align:center;padding:20px;color:#aaa;font-size:0.82rem}
.load-more .mini-spinner{width:22px;height:22px;border:2px solid var(--cream);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
#cart-panel{display:none;position:fixed;inset:0;z-index:200;background:rgba(26,20,16,0.55);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:14px}
#cart-panel.open{display:flex}
.cart-box{background:white;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,0.25)}
.cart-box h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;margin-bottom:3px}
.cart-box .subtitle{font-size:0.72rem;color:#999;margin-bottom:18px;text-transform:uppercase;letter-spacing:0.08em}
.cart-items{border-top:1px solid var(--cream);margin-bottom:18px}
.cart-item{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--cream)}
.cart-item img{width:52px;height:74px;object-fit:contain;border-radius:4px;pointer-events:none;-webkit-user-drag:none;background:var(--cream)}
.cart-item-name{flex:1;font-size:0.86rem;font-weight:500}
.cart-item-qty{font-size:0.8rem;color:var(--gold);font-weight:600}
.cart-remove{background:none;border:none;color:#ccc;cursor:pointer;font-size:0.95rem;padding:0 3px;transition:color 0.15s}
.cart-remove:hover{color:#e44}
.form-section h3{font-family:'Cormorant Garamond',serif;font-size:1.05rem;margin-bottom:12px;color:var(--ink);padding-top:13px;border-top:1px solid var(--cream)}
.form-group{margin-bottom:11px}
.form-group label{display:block;font-size:0.82rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:6px;color:#2a2018}
.tag{font-size:0.72rem;font-weight:400;letter-spacing:0;text-transform:none}
.oblig{color:#b8923a}
.opcl{color:#aaa}
.form-group input,.form-group textarea{width:100%;padding:8px 11px;border:1px solid #ddd;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:0.86rem;transition:border-color 0.2s;resize:none}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--gold)}
.submit-btn{width:100%;background:var(--ink);color:white;border:none;padding:12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;letter-spacing:0.05em;cursor:pointer;transition:background 0.2s;margin-top:5px}
.submit-btn:hover{background:var(--accent)}
.submit-btn:disabled{background:#ccc;cursor:not-allowed}
.close-cart{float:right;background:none;border:none;font-size:1.35rem;cursor:pointer;color:#aaa;line-height:1;margin-top:-3px}
.close-cart:hover{color:var(--ink)}
#success-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(26,20,16,0.7);align-items:center;justify-content:center}
#success-overlay.open{display:flex}
.success-box{background:white;border-radius:16px;padding:40px 32px;text-align:center;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,0.3)}
.success-icon{width:56px;height:56px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.success-icon svg{width:28px;height:28px;stroke:#16a34a;fill:none;stroke-width:2.5}
.success-box h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;margin-bottom:8px}
.success-box p{font-size:0.83rem;color:#888;line-height:1.6;margin-bottom:18px}
.ok-btn{background:var(--ink);color:white;border:none;padding:10px 28px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.86rem;cursor:pointer;transition:background 0.2s}
.ok-btn:hover{background:var(--accent)}
.empty-gallery{text-align:center;padding:80px 40px;color:#aaa;font-family:'Cormorant Garamond',serif;font-size:1.3rem}
@media(max-width:600px){
  header{padding:10px 14px}.brand{font-size:1.15rem}.brand-logo{width:34px;height:34px}
  #gallery{padding:10px}
  .gallery-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .cart-box{padding:18px 14px}
  .instructions{padding:9px 14px;font-size:0.74rem}
}
</style>
</head>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyQ-axr7jmOh8-gK6tGah8xCJfZLUifJVHFXMU23e99YJzYyyHK86j7Uk85_BZeekuhgQ/exec";
const GITHUB_API="https://api.github.com/repos/kreascz-coder/Imagenes_Catalogo/contents/?ref=main";
const RAW_BASE="https://raw.githubusercontent.com/kreascz-coder/Imagenes_Catalogo/main/";
const BATCH=20;

document.addEventListener('keydown',e=>{if(e.key==='PrintScreen'||(e.ctrlKey&&e.key==='p')||(e.metaKey&&e.shiftKey&&['3','4','5'].includes(e.key)))e.preventDefault();});
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('dragstart',e=>e.preventDefault());

let cart={};
let allImages=[];
let loadedCount=0;
let imgObserver;
let scrollObserver;
let deferredPrompt=null;

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('install-banner').style.display='block';
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-banner').style.display='none';
  deferredPrompt=null;
});
function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').style.display='none';});
  }else{
    alert('Para instalar: menú del navegador (⋮) → Agregar a pantalla de inicio');
  }
}
function shareApp(){
  const data={title:'JR Catálogo',text:'¡Mira el catálogo de JR! Puedes hacer tu pedido directo desde aquí 🛍️',url:'https://kreascz-coder.github.io'};
  if(navigator.share){navigator.share(data).catch(()=>{});}
  else{navigator.clipboard.writeText(data.url).then(()=>{alert('¡Link copiado!');}).catch(()=>{alert('Link: https://kreascz-coder.github.io');});}
}

window.addEventListener('load',()=>{updateDate();setInterval(updateDate,60000);loadImages();});
function updateDate(){document.getElementById('date-display').textContent=new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}

async function loadImages(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('error-msg').style.display='none';
  document.getElementById('gallery').style.display='none';
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),15000);
    const res=await fetch(GITHUB_API,{signal:controller.signal});
    clearTimeout(timeout);
    if(!res.ok) throw new Error('Error '+res.status);
    const files=await res.json();
    if(!Array.isArray(files)) throw new Error('Respuesta inesperada');
    const exts=/\.(jpg|jpeg|png|webp|gif)$/i;
    allImages=files
      .filter(f=>f.type==='file'&&exts.test(f.name))
      .map(f=>({name:f.name.replace(/\.[^.]+$/,''),url:RAW_BASE+encodeURIComponent(f.name)}))
      .sort((a,b)=>a.name.localeCompare(b.name,'es'));
    showGallery();
  }catch(err){
    document.getElementById('loading').style.display='none';
    const em=document.getElementById('error-msg');
    em.style.display='block';
    em.innerHTML=`<strong>No se pudo cargar el catálogo.</strong><br><small style="color:#aaa">${err.message}</small>`;
  }
}

function showGallery(){
  document.getElementById('loading').style.display='none';
  const grid=document.getElementById('gallery-grid');
  grid.innerHTML='';
  if(allImages.length===0){grid.innerHTML='<div class="empty-gallery">La carpeta no tiene imágenes aún.</div>';document.getElementById('gallery').style.display='block';return;}
  loadedCount=0;
  document.getElementById('gallery').style.display='block';
  imgObserver=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const img=entry.target;
        if(img.dataset.src){img.src=img.dataset.src;img.onload=()=>img.classList.add('loaded');img.onerror=()=>img.classList.add('loaded');delete img.dataset.src;imgObserver.unobserve(img);}
      }
    });
  },{rootMargin:'400px'});
  const sentinel=document.createElement('div');
  sentinel.id='sentinel';sentinel.className='load-more';
  sentinel.innerHTML='<div class="mini-spinner"></div>';
  scrollObserver=new IntersectionObserver((entries)=>{
    if(entries[0].isIntersecting&&loadedCount<allImages.length){renderBatch(grid,sentinel);}
  },{rootMargin:'100px'});
  grid.appendChild(sentinel);
  scrollObserver.observe(sentinel);
  renderBatch(grid,sentinel);
}

function renderBatch(grid,sentinel){
  const batch=allImages.slice(loadedCount,loadedCount+BATCH);
  batch.forEach(img=>{
    const card=document.createElement('div');
    card.className='item-card'+(cart[img.name]?' selected':'');
    card.id=`card-${img.name}`;
    card.innerHTML=`<div class="img-wrap"><div class="img-placeholder"></div><img data-src="${img.url}" alt="${img.name}"><div class="check-overlay"><svg viewBox="0 0 24 24" width="14" height="14"><polyline points="20 6 9 17 4 12" stroke-width="3" stroke="white" fill="none"/></svg></div></div><div class="item-info"><div class="item-name">${img.name}</div><div class="qty-control"><button class="qty-btn" onclick="changeQty(event,'${img.name}',-1)">−</button><input class="qty-input" type="number" id="qty-${img.name}" value="${cart[img.name]?cart[img.name].qty:1}" min="1" inputmode="numeric" onclick="event.stopPropagation();this.select();" onfocus="this.select();" oninput="setQty(event,'${img.name}')"><button class="qty-btn" onclick="changeQty(event,'${img.name}',1)">+</button></div></div>`;
    card.addEventListener('click',()=>toggleCard(img.name,img.url));
    grid.insertBefore(card,sentinel);
    imgObserver.observe(card.querySelector('img'));
  });
  loadedCount+=batch.length;
  if(loadedCount>=allImages.length)sentinel.style.display='none';
}

function toggleCard(name,url){const card=document.getElementById(`card-${name}`);if(cart[name]){delete cart[name];card.classList.remove('selected');}else{cart[name]={name,url,qty:1};card.classList.add('selected');const qi=document.getElementById(`qty-${name}`);if(qi)qi.value=1;}updateCartCount();}
function changeQty(e,name,delta){e.stopPropagation();if(!cart[name])return;const input=document.getElementById(`qty-${name}`);const newQty=Math.max(1,(parseInt(input.value)||1)+delta);input.value=newQty;cart[name].qty=newQty;}
function setQty(e,name){e.stopPropagation();if(!cart[name])return;cart[name].qty=Math.max(1,parseInt(e.target.value)||1);}
function updateCartCount(){document.getElementById('cart-count').textContent=Object.keys(cart).length;}
function openCart(){
  if(Object.keys(cart).length===0){alert('Selecciona al menos un modelo primero.');return;}
  const list=document.getElementById('cart-items-list');list.innerHTML='';
  Object.entries(cart).forEach(([name,item])=>{const div=document.createElement('div');div.className='cart-item';div.innerHTML=`<img src="${item.url}" alt="${item.name}"><div class="cart-item-name">${item.name}</div><div class="cart-item-qty">× ${item.qty}</div><button class="cart-remove" onclick="removeFromCart('${name}')">✕</button>`;list.appendChild(div);});
  document.getElementById('cart-panel').classList.add('open');
}
function closeCart(){document.getElementById('cart-panel').classList.remove('open');}
function removeFromCart(name){delete cart[name];const card=document.getElementById(`card-${name}`);if(card)card.classList.remove('selected');updateCartCount();if(Object.keys(cart).length===0){closeCart();return;}openCart();}
async function submitOrder(){
  const nombre=document.getElementById('f-nombre').value.trim();
  const ubicacion=document.getElementById('f-ubicacion').value.trim();
  const telefono=document.getElementById('f-telefono').value.trim();
  const nota=document.getElementById('f-nota').value.trim();
  if(!nombre||!ubicacion){alert('Por favor completa tu nombre y ubicación.');return;}
  const items=Object.values(cart).map(i=>({modelo:i.name,cantidad:i.qty}));
  const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='Enviando...';
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'order',nombre,ubicacion,telefono,nota,items,fecha:new Date().toLocaleString('es-ES')})});
    closeCart();document.getElementById('success-overlay').classList.add('open');
  }catch(err){alert('Error al enviar. Intenta de nuevo.');}
  btn.disabled=false;btn.textContent='Enviar pedido →';
}
function resetAll(){cart={};document.querySelectorAll('.item-card').forEach(c=>c.classList.remove('selected'));document.querySelectorAll('.qty-input').forEach(s=>{s.value=1;});updateCartCount();document.getElementById('success-overlay').classList.remove('open');['f-nombre','f-ubicacion','f-telefono','f-nota'].forEach(id=>{document.getElementById(id).value='';});}
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});}
</script>
</body>
</html>
